version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: harvesterpdata
      POSTGRES_USER: harvestadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMe!2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harvestadmin -d harvesterpdata"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://harvestadmin:${DB_PASSWORD:-ChangeMe!2026}@db:5432/harvesterpdata
      JWT_SECRET: ${JWT_SECRET:-change-this-to-random-string}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: https://admin.absodok.com,https://client.absodok.com,https://factory.absodok.com
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
    depends_on:
      - api
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew; done'"

volumes:
  pgdata:
  uploads:
  certbot-etc:
  certbot-var:
