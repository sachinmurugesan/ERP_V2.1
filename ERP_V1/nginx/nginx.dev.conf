# ============================================
# HarvestERP — nginx dev config  (nginx/nginx.dev.conf)
# Strangler-fig reverse proxy for local Docker Compose development.
#
# Routing priority (highest → lowest):
#   1. Exact matches         → Next.js  (/login, /dashboard)
#   2. Next.js HMR WebSocket → Next.js  (/_next/webpack-hmr)
#   3. Next.js static assets → Next.js  (/_next/)
#   4. Next.js auth API      → Next.js  (/api/auth/)
#   5. Backend API           → FastAPI  (/api/)
#   6. Default               → Vue      (everything else + Vite HMR WebSocket)
#
# To add a migrated page, add a location block here AND in nginx/nginx.conf,
# then update docs/migration/MIGRATED_PATHS.md.
# ============================================

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # ── Upstream declarations ─────────────────────────────────────────────
    # These must match the service names in docker-compose.yml.

    upstream nextjs_upstream {
        server nextjs:3000;
        keepalive 32;
    }

    upstream vue_upstream {
        server vue:5173;
        keepalive 32;
    }

    upstream backend_upstream {
        # Note: backend/Dockerfile exposes 8001, not 8000.
        server api:8001;
        keepalive 32;
    }

    # ── Common proxy header macro ─────────────────────────────────────────
    # Applied in each location block below (nginx has no real macro system;
    # headers are repeated per location for explicit auditing).

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 50M;

        # Add strangler-fig marker so callers can tell Next.js is handling this
        add_header X-Handled-By "nextjs" always;

        # ── 1. Exact migrated pages → Next.js ───────────────────────────
        # Add one `location =` block per migrated page.
        # See docs/migration/MIGRATED_PATHS.md for the canonical list.

        location = /login {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        location = /dashboard {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        # ── 2. Next.js HMR WebSocket (must precede /_next/ prefix) ──────

        location /_next/webpack-hmr {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }

        # ── 3. Next.js static assets, chunks, images ────────────────────

        location /_next/ {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
        }

        # ── 4. Next.js auth API routes ───────────────────────────────────
        # /api/auth/* is handled by Next.js API routes (apps/web/src/app/api/auth/).
        # This block must appear BEFORE the /api/ fallback below.

        location /api/auth/ {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        # ── 5. Backend API (FastAPI) ─────────────────────────────────────

        location /api/ {
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        # ── 6. Default → Vue (with Vite HMR WebSocket support) ──────────

        location / {
            proxy_pass         http://vue_upstream;
            proxy_http_version 1.1;
            # Vite HMR uses WebSocket; must upgrade connections
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
            proxy_read_timeout 86400s;
        }
    }
}
