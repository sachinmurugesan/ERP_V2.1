        listen [::]:443 ssl;
        http2 on;
        server_name api.absodok.com;

        ssl_certificate     /etc/letsencrypt/live/absodok.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/absodok.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api_backend/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Default: drop connections to unknown hosts
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        ssl_certificate     /etc/letsencrypt/live/absodok.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/absodok.com/privkey.pem;
        server_name _;
        return 444;
