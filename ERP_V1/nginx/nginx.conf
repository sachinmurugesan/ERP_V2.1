events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------
    # Global tuning
    # -------------------------------------------------------------------
    server_tokens off;                          # Hide nginx version
    client_max_body_size 50M;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/rss+xml image/svg+xml;

    # -------------------------------------------------------------------
    # Rate limiting
    # -------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # -------------------------------------------------------------------
    # Upstream
    # -------------------------------------------------------------------

    # Existing upstreams (unchanged)
    upstream api_backend    { server api:8001; }
    upstream web_frontend   { server frontend:80; }

    # Task 9 — strangler-fig upstreams
    upstream nextjs_upstream {
        server nextjs:3000;
        keepalive 64;
    }

    # vue_upstream aliases web_frontend for clarity in location blocks;
    # both resolve to the same Vue production container (port 80).
    upstream vue_upstream {
        server frontend:80;
        keepalive 64;
    }

    upstream backend_upstream {
        server api:8001;
        keepalive 64;
    }

    # -------------------------------------------------------------------
    # Security header map — applied on every TLS server block below
    # -------------------------------------------------------------------
    map $sent_http_content_type $disposition_header {
        default                                      "";
        "~^text/html"                                "";
        "~^image/"                                   "";
        "~^application/pdf"                          "";
        default                                      "attachment";
    }

    # -------------------------------------------------------------------
    # Shared TLS config (Mozilla Intermediate — 2026)
    # -------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------
    # HTTP : ACME challenge + redirect everything else to HTTPS
    # -------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name admin.absodok.com client.absodok.com factory.absodok.com api.absodok.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------
    # Reusable security-header snippet (add_header is inherited at server scope)
    # -------------------------------------------------------------------
    # HSTS: 1yr, includeSubDomains, preload
    # CSP: strict default-src self; API calls allowed to self + Sentry endpoint
    # -------------------------------------------------------------------

    # -------------------------------------------------------------------
    # admin.absodok.com (internal portal)
    # -------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name admin.absodok.com;

        ssl_certificate     /etc/letsencrypt/live/absodok.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/absodok.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/absodok.com/chain.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://*.ingest.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── Task 9: Migrated pages → Next.js ────────────────────────────
        # Add one `location =` block here (and in nginx.dev.conf, and in
        # MIGRATED_PATHS.md) each time a page migrates from Vue to Next.js.

        location = /login {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        location = /dashboard {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        # Exact-match only: /orders/{id} and /orders/new stay on Vue.
        location = /orders {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        # Exact-match only: /products/new, /products/{id}/edit, and
        # /products/upload-excel stay on Vue.
        location = /products {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        location /_next/ {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
        }

        # ── Next.js auth API routes (Task 8/9) ──────────────────────────
        # /api/auth/* is now handled by Next.js, not FastAPI.
        # Must appear BEFORE the /api/ block below.

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /uploads/ {
            # internal: only reachable via X-Accel-Redirect from the FastAPI backend.
            # Direct client requests return 404. G-019 Patch 14.
            internal;
            alias /app/uploads/;
        }

        location / {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # -------------------------------------------------------------------
