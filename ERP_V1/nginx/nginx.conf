    # -------------------------------------------------------------------
    # factory.absodok.com (factory portal)
    # -------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name factory.absodok.com;

        ssl_certificate     /etc/letsencrypt/live/absodok.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/absodok.com/privkey.pem;
